# Build + publish the Minerva v2 (web) image. Pushes to Docker Hub
# under thefarshad/minerva-web; the droplet's compose pulls this
# image at deploy time, so the 1 GB box never has to run npm + next
# build itself (last attempt OOM-killed every container on it).
# (no-op edit — retrigger publish after a transient Buildx failure)
#
# Triggered by: any push to main that touches web/, or manually
# via the Actions tab.
#
# Required secrets:
#   DOCKERHUB_USERNAME — your Docker Hub login
#   DOCKERHUB_TOKEN    — a Docker Hub access token

name: Publish minerva-web image

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-publish.yml'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Newer pushes cancel any older publish still running, so we don't
# race a slow build that would otherwise overwrite the newer image
# tag landing first.
concurrency:
  group: web-publish
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/minerva-web"
          SHA="${GITHUB_SHA::7}"
          echo "tags=${IMAGE}:latest,${IMAGE}:sha-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # amd64 only for now — the droplet is x86; arm64 builds
          # take twice as long and we don't deploy there yet.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Bake the commit SHA + build timestamp into the image so
          # the running UI can display them. NEXT_PUBLIC_* envs are
          # frozen at next-build time, so we pass them through as
          # build-args and the Dockerfile re-exports them.
          build-args: |
            NEXT_PUBLIC_BUILD_SHA=${{ github.sha }}
            NEXT_PUBLIC_BUILD_TIME=${{ github.event.head_commit.timestamp }}
