# Auto-deploy to the minerva-prod DigitalOcean droplet.
#
# Pushes to `main` (and manual workflow_dispatch runs) SSH to the
# droplet and rebuild + restart the helper container from the
# checked-out repo. The SPA assets are baked into the image at
# build time, so a rebuild is what actually ships new SPA code.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DROPLET_HOST     — IP or hostname of the droplet (e.g. 203.0.113.10)
#   DROPLET_USER     — SSH user (root)
#   DROPLET_SSH_KEY  — the matching private key (PEM, including BEGIN/END lines)
#   DROPLET_HOST_KEY — the droplet's host key from `ssh-keyscan` for known_hosts
#                      pinning. Single line, format: "<host> ssh-ed25519 <key>".

name: Deploy to droplet

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'sw.js'
      - 'opensearch.xml'
      - 'manifest.webmanifest'
      - 'privacy.html'
      - 'terms.html'
      - 'rss.html'
      - 'assets/**'
      - 'docs/Dockerfile'
      - 'docs/docker-compose.yml'
      - 'docs/minerva-services.py'
      - '.github/workflows/deploy-droplet.yml'
  # web-only commits don't match the path filter above (they live
  # under `web/**`), so they used to leave the droplet on a stale
  # image after the web-publish workflow finished pushing the new
  # one to Docker Hub. Chain this deploy after a successful
  # web-publish so any `web/**` push also pulls + restarts the
  # container. The job script handles both cases — the pull is a
  # no-op when the image SHA already matches.
  workflow_run:
    workflows: ['Publish minerva-web image']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}
  # Known failure mode: a web-publish-triggered deploy can be
  # cancelled by `cancel-in-progress` when a near-simultaneous
  # non-web push (matching the paths filter above) lands its own
  # deploy. That later deploy may `docker compose pull` before the
  # web image finished pushing to Docker Hub, leaving the droplet
  # on the previous web SHA. Recovery: re-run this workflow (push
  # any paths-matching change, or use the Actions tab) — the pull
  # is idempotent and will land the current :latest.

# Only one deploy at a time; if a new push lands while one is
# running, queue the new one but cancel any earlier queued runs.
concurrency:
  group: deploy-droplet
  # Cancel an in-flight deploy when a newer push arrives, so the
  # droplet doesn't land on the older SHA after the newer one was
  # already in the workflow queue. The trade-off (a half-finished
  # build is thrown away) is fine for this app — the build is
  # idempotent and re-runs cheaply.
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # When triggered by web-publish completion, only run if that
    # build actually succeeded. workflow_run fires on every
    # conclusion (success, failure, cancelled), and pulling a
    # half-built image would land an inconsistent SHA.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DROPLET_HOST_KEY }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Pull, rebuild, and restart on the droplet
        run: |
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" \
            "set -e
             cd /opt/minerva
             # Sync to origin/main forcefully — discards any local
             # edits to tracked files (a one-time sudo sed for a
             # hot-patch was enough to wedge git pull --rebase with
             # 'unstaged changes' and silently break every subsequent
             # CI deploy until someone SSH'd in to discard). Untracked
             # files (docker-compose.override.yml lives there
             # intentionally) are preserved by reset --hard.
             git fetch origin main
             git reset --hard origin/main
             cd docs
             # Reclaim disk BEFORE pulling, not after. The 24 GB box
             # fills fast — every web-publish pulls a fresh ~1.5 GB
             # image and Compose never evicts the previous one. A
             # full disk makes `docker compose pull` fail; with the
             # `|| true` now gone from the pull, that fails the whole
             # deploy. Prune ALL unused images, not just ones older
             # than 12h — rapid deploy bursts pile up superseded
             # images faster than that window, which is exactly how
             # the box reached 95% and stranded several deploys. `-a`
             # only removes images no container references, so the
             # running stack is never touched. `df` lines bracket it
             # so the deploy log shows the disk reclaim.
             df -h / | tail -1
             docker container prune -f 2>&1 | tail -1 || true
             docker image prune -af 2>&1 | tail -1 || true
             docker builder prune -af 2>&1 | tail -1 || true
             df -h / | tail -1
             # Pull any newer minerva-web image that web-publish just
             # pushed to Docker Hub. Capture the local image digest
             # before+after so we can tell whether we actually need
             # to recreate the container. NO `|| true` — a failed
             # pull must fail the deploy loudly, not mask a stale
             # image behind a green check.
             before=\$(docker image inspect thefarshad/minerva-web:latest --format '{{.Id}}' 2>/dev/null || echo missing)
             docker compose pull minerva-web
             after=\$(docker image inspect thefarshad/minerva-web:latest --format '{{.Id}}' 2>/dev/null || echo missing)
             docker compose build minerva-services
             if [ \"\$before\" != \"\$after\" ]; then
               echo \"web image changed: \$before -> \$after — force-recreating\"
               docker compose up -d --force-recreate --no-deps minerva-web
             fi
             # Bring up everything else (services / postgres / etc.)
             # in idempotent mode — no-op when nothing changed.
             docker compose up -d
             sleep 6
             curl -sS http://127.0.0.1:8765/health | head -c 200"
