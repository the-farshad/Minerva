# Auto-deploy to the minerva-prod DigitalOcean droplet.
#
# Pushes to `main` (and manual workflow_dispatch runs) SSH to the
# droplet and rebuild + restart the helper container from the
# checked-out repo. The SPA assets are baked into the image at
# build time, so a rebuild is what actually ships new SPA code.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DROPLET_HOST     — IP or hostname of the droplet (e.g. 203.0.113.10)
#   DROPLET_USER     — SSH user (root)
#   DROPLET_SSH_KEY  — the matching private key (PEM, including BEGIN/END lines)
#   DROPLET_HOST_KEY — the droplet's host key from `ssh-keyscan` for known_hosts
#                      pinning. Single line, format: "<host> ssh-ed25519 <key>".

name: Deploy to droplet

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'sw.js'
      - 'opensearch.xml'
      - 'manifest.webmanifest'
      - 'privacy.html'
      - 'terms.html'
      - 'rss.html'
      - 'assets/**'
      - 'docs/Dockerfile'
      - 'docs/docker-compose.yml'
      - 'docs/minerva-services.py'
      - '.github/workflows/deploy-droplet.yml'
  # web-only commits don't match the path filter above (they live
  # under `web/**`), so they used to leave the droplet on a stale
  # image after the web-publish workflow finished pushing the new
  # one to Docker Hub. Chain this deploy after a successful
  # web-publish so any `web/**` push also pulls + restarts the
  # container. The job script handles both cases — the pull is a
  # no-op when the image SHA already matches.
  workflow_run:
    workflows: ['Publish minerva-web image']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}
# One deploy at a time, but QUEUE — don't cancel.
concurrency:
  group: deploy-droplet
  # `cancel-in-progress: false` is deliberate. Each deploy starts
  # with `git reset --hard origin/main` + `docker compose pull`, so
  # *every* deploy ships whatever is current — there is no "older
  # SHA" risk that cancelling would protect against. Cancelling, by
  # contrast, was actively harmful: during a burst of pushes each
  # new deploy cancelled the previous mid-run, so no deploy ever
  # reached the `up -d` step and the droplet stayed on a stale
  # build until pushes stopped for a full ~10-min cycle. Queueing
  # means every deploy runs to completion; redundant intermediate
  # runs are cheap and the last one still lands the latest.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # When triggered by web-publish completion, only run if that
    # build actually succeeded. workflow_run fires on every
    # conclusion (success, failure, cancelled), and pulling a
    # half-built image would land an inconsistent SHA.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DROPLET_HOST_KEY }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Pull, rebuild, and restart on the droplet
        run: |
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" \
            "set -e
             cd /opt/minerva
             git fetch origin main
             git reset --hard origin/main
             cd docs
             echo '[deploy] reclaiming disk'
             df -h / | tail -1
             docker container prune -f 2>&1 | tail -1 || true
             docker image prune -af 2>&1 | tail -1 || true
             docker builder prune -af 2>&1 | tail -1 || true
             df -h / | tail -1
             before=\$(docker image inspect thefarshad/minerva-web:latest --format '{{.Id}}' 2>/dev/null || echo missing)
             echo '[deploy] pulling minerva-web'
             docker compose pull minerva-web
             after=\$(docker image inspect thefarshad/minerva-web:latest --format '{{.Id}}' 2>/dev/null || echo missing)
             echo '[deploy] building minerva-services'
             docker compose build minerva-services
             if [ \"\$before\" != \"\$after\" ]; then
               echo '[deploy] web image changed, force-recreating minerva-web'
               docker compose up -d --force-recreate --no-deps minerva-web
             fi
             echo '[deploy] up -d (full stack)'
             docker compose up -d
             sleep 10
             (curl -sS --max-time 10 http://127.0.0.1:8765/health | head -c 200) || echo '[deploy] helper not answering yet, starts slowly - deploy still ok'
             echo
             echo '[deploy] done'"
          # NOTE: keep the SSH command string above free of backticks
          # and unescaped $ — it is a double-quoted argument in the
          # runner's bash, which command-substitutes them locally
          # before ssh ever runs. A stray backtick in a comment here
          # (e.g. a literal '|| true' in backticks) is a local syntax
          # error that fails the whole step. Rationale that used to
          # live in inline comments now lives in this trailing block:
          #  - git reset --hard: a past sudo-sed hot-patch wedged
          #    'git pull --rebase' on every later deploy; reset is
          #    immune. Untracked files (docker-compose.override.yml)
          #    are preserved.
          #  - prune-before-pull: the 24 GB box fills fast (each
          #    web-publish is a fresh ~1.5 GB image); prune ALL unused
          #    images (-a keeps anything a container references) so
          #    the pull has room. A full disk used to fail the pull.
          #  - the pull has no '|| true': a failed pull must fail the
          #    deploy loudly, not strand a stale image behind green.
          #  - the curl health check is informational only: the
          #    deploy is already done by then, and minerva-services
          #    (Python) is slow to answer, so it must never be fatal.
