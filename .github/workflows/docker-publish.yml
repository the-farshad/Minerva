# Build and publish the Minerva local-services image to Docker Hub.
#
# Triggered manually (workflow_dispatch) or by pushing a tag named
# `services-vN` (e.g. `services-v1`). The image is tagged with
#   - `latest`
#   - the tag name when triggered by a tag push
#   - the short SHA of the commit
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME — your Docker Hub login
#   - DOCKERHUB_TOKEN    — a Docker Hub access token
#
# Image name defaults to `<DOCKERHUB_USERNAME>/minerva-services`. Override
# by editing IMAGE below.

name: Publish minerva-services image

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'services-v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/minerva-services"
          SHA="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:latest,${IMAGE}:sha-${SHA}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAGNAME="${GITHUB_REF##*/}"
            TAGS="${TAGS},${IMAGE}:${TAGNAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: docs
          file: docs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo 'Run with: `docker run -p 8765:8765 ${{ steps.meta.outputs.image }}`' >> "$GITHUB_STEP_SUMMARY"
